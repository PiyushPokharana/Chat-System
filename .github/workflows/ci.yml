name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax checks
        run: |
          node --check src/index.js
          node --check src/sockets/socketHandler.js
          node --check public/app.js

      - name: Smoke tests
        run: |
          npm run phase1:smoke
          npm run phase2:smoke
          npm run phase3:smoke
